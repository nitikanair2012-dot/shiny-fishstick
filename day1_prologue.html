<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 1 Prologue</title>
  <style>
    :root {
      --bg-color: #181818;
      --panel-color: rgba(20, 20, 30, 0.95);
      --text-color: #e3e3e3;
      --accent: #a18f7c;
      --shadow: rgba(0,0,0,0.65);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #282828 0%, #121212 75%);
      color: var(--text-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-root {
      width: 840px;
      height: 480px;
      position: relative;
      background: #141414;
      border: 4px solid #2c2c2c;
      box-shadow: 0 0 40px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .scene-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .scene-layer.visible {
      opacity: 1;
    }

    #classroom {
      position: relative;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(8, 1fr);
      background-color: #243043;
      background-image:
        linear-gradient(180deg, #243043 0%, #1a212d 60%, #0f1319 100%),
        url('./backgrounds/CLASSROOM.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    #classroom::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.3;
      pointer-events: none;
    }

    #classroom::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, transparent 42%, rgba(255,255,255,0.05) 42%, rgba(255,255,255,0.05) 44%, transparent 44%, transparent 54%, rgba(255,255,255,0.06) 54%, rgba(255,255,255,0.06) 55%, transparent 55%);
      opacity: 0.4;
      pointer-events: none;
    }

    #hallway {
      position: absolute;
      inset: 0;
      background-color: #11161d;
      background-image:
        linear-gradient(180deg, #11161d 0%, #0c1015 55%, #07090c 100%),
        url('./backgrounds/HALLWAY.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      overflow: hidden;
    }

    #hallway::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 220px;
      height: 160px;
      background: linear-gradient(180deg, #181f29 0%, #11161d 100%);
      border-top: 3px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 16px 0 rgba(255,255,255,0.02);
    }

    #hallway::after {
      content: '';
      position: absolute;
      left: 80px;
      right: 80px;
      top: 36px;
      height: 110px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 12%, transparent 88%, rgba(255,255,255,0.03) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .hallway-wall {
      position: absolute;
      left: 24px;
      right: 24px;
      top: 26px;
      height: 170px;
      background: linear-gradient(180deg, #1c2430 0%, #141a23 100%);
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      z-index: 1;
    }

    .hallway-wall::before {
      content: '';
      position: absolute;
      left: 16px;
      right: 16px;
      top: 16px;
      height: 12px;
      background: #121820;
      box-shadow: 0 10px 0 #121820, 0 20px 0 #121820;
    }

    #stall-door {
      position: absolute;
      right: 160px;
      bottom: 88px;
      width: 100px;
      height: 170px;
      background: linear-gradient(180deg, #2d323d 0%, #1d222b 100%);
      border: 2px solid #191f27;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 10px 20px rgba(0,0,0,0.35);
      z-index: 2;
    }

    #stall-door::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #b0b5bb;
      border-radius: 2px;
      right: 14px;
      top: 70px;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.12);
    }

    #toilet {
      position: absolute;
      right: 250px;
      bottom: 92px;
      width: 60px;
      height: 46px;
      background: #c2c8cf;
      border: 2px solid #8c949e;
      border-radius: 10px 10px 6px 6px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.14);
      z-index: 2;
    }

    #toilet::before {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      top: -20px;
      height: 22px;
      background: #b8bec6;
      border: 2px solid #8c949e;
      border-radius: 10px 10px 0 0;
    }

    .wall-panel {
      position: absolute;
      left: 24px;
      right: 24px;
      top: 18px;
      height: 82px;
      background: linear-gradient(90deg, #313744 0%, #222834 100%);
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 10px 24px rgba(0,0,0,0.28);
      z-index: 0;
    }

    .wall-panel::before {
      content: '';
      position: absolute;
      left: 14px;
      right: 14px;
      top: 16px;
      height: 8px;
      background: #28303a;
      box-shadow: 0 14px 0 #28303a, 0 28px 0 #28303a;
    }

    .chalkboard {
      position: absolute;
      left: 98px;
      top: 36px;
      width: 240px;
      height: 44px;
      background: #2f4b39;
      border: 2px solid #1d2a24;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 6px 14px rgba(0,0,0,0.25);
      z-index: 1;
    }

    .chalkboard::after {
      content: '';
      position: absolute;
      left: 16px;
      top: 10px;
      width: 8px;
      height: 8px;
      background: #c4d1bc;
      box-shadow: 16px 0 #c4d1bc, 32px 0 #c4d1bc, 0 12px #c4d1bc, 16px 12px #c4d1bc;
    }

    .window-pane {
      position: absolute;
      top: 34px;
      width: 96px;
      height: 56px;
      background: linear-gradient(180deg, #516175 0%, #2f3947 100%);
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      z-index: 1;
    }

    .window-pane::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2);
    }

    .window-left { left: 372px; }
    .window-right { right: 90px; }

    .floor-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 102px;
      background: linear-gradient(180deg, #1a1f27 0%, #10141a 100%);
      border-top: 3px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.04);
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 2px, transparent 2px);
      background-size: 24px 24px;
    }

    .desk {
      width: 80%;
      height: 60%;
      background: linear-gradient(180deg, #4f5668 0%, #3f4453 100%);
      border: 2px solid #1f2229;
      border-radius: 0;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08), inset 0 0 8px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.25);
      position: relative;
      z-index: 2;
    }

    .desk::before {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      top: -10px;
      height: 10px;
      background: #303540;
      box-shadow: 0 2px 0 rgba(255,255,255,0.08);
    }

    .desk::after {
      content: '';
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: -10px;
      height: 10px;
      background: #2c313b;
    }

    .desk-left { grid-column: 3 / 5; grid-row: 4 / 6; justify-self: center; align-self: center; }
    .desk-right { grid-column: 7 / 9; grid-row: 4 / 6; justify-self: center; align-self: center; }

    .sprite {
      --skin: #f0c6b0;
      --hair: #6d4f4f;
      --top: #7c5e74;
      --pants: #2f3546;
      --shoe: #1f1e24;
      width: 56px;
      height: 80px;
      image-rendering: pixelated;
      position: absolute;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      overflow: visible;
    }

    .scene-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      z-index: 0;
    }

    .sprite-image {
      width: 220px;
      height: 368px;
      image-rendering: pixelated;
      position: absolute;
      object-fit: contain;
      object-position: center bottom;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
      z-index: 9;
      pointer-events: none;
    }

    .sprite::before,
    .sprite::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      image-rendering: pixelated;
      background: var(--hair);
    }

    .sprite::before {
      left: 0;
      top: 0;
      background: var(--hair);
      box-shadow:
        8px 0 var(--hair), 16px 0 var(--hair), 24px 0 var(--hair), 32px 0 var(--hair), 40px 0 var(--hair), 48px 0 var(--hair),
        0 8px var(--hair), 8px 8px var(--skin), 16px 8px var(--skin), 24px 8px var(--skin), 32px 8px var(--skin), 40px 8px var(--skin), 48px 8px var(--hair),
        0 16px var(--hair), 8px 16px var(--skin), 16px 16px #000, 24px 16px var(--skin), 32px 16px #000, 40px 16px var(--skin), 48px 16px var(--hair),
        0 24px var(--hair), 8px 24px var(--skin), 16px 24px var(--skin), 24px 24px var(--skin), 32px 24px var(--skin), 40px 24px var(--skin), 48px 24px var(--hair),
        0 32px var(--top), 8px 32px var(--top), 16px 32px var(--top), 24px 32px var(--top), 32px 32px var(--top), 40px 32px var(--top), 48px 32px var(--top);
    }

    .sprite::after {
      left: 0;
      top: 40px;
      background: var(--top);
      box-shadow:
        8px 0 var(--top), 16px 0 var(--top), 24px 0 var(--top), 32px 0 var(--top), 40px 0 var(--top), 48px 0 var(--top),
        0 8px var(--top), 8px 8px var(--top), 16px 8px var(--top), 24px 8px var(--top), 32px 8px var(--top), 40px 8px var(--top), 48px 8px var(--top),
        0 16px var(--pants), 8px 16px var(--pants), 16px 16px var(--pants), 24px 16px var(--pants), 32px 16px var(--pants), 40px 16px var(--pants), 48px 16px var(--pants),
        0 24px var(--pants), 8px 24px var(--pants), 16px 24px var(--pants), 24px 24px var(--pants), 32px 24px var(--pants), 40px 24px var(--pants), 48px 24px var(--pants),
        8px 32px var(--shoe), 16px 32px var(--shoe), 24px 32px var(--shoe), 32px 32px var(--shoe), 40px 32px var(--shoe), 48px 32px var(--shoe);
    }

    #nene-sprite { left: 210px; top: 230px; z-index: 9; }
    #aoi-sprite { --hair: #3f6a8e; --top: #5c8b76; --pants: #283243; left: 378px; top: 242px; }
    #player-sprite { --hair: #6b4f31; --top: #947766; --pants: #34353d; left: 182px; top: 362px; }

    .desk-backdrop {
      position: absolute;
      left: 48px;
      right: 48px;
      top: 48px;
      bottom: 120px;
      background: linear-gradient(180deg, #232834 0%, #171b21 100%);
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), inset 0 0 40px rgba(0,0,0,0.35);
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    .desk-backdrop::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 20%;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }

    .desk-backdrop::after {
      content: '';
      position: absolute;
      left: 16%;
      right: 16%;
      top: 34%;
      height: 2px;
      background: rgba(255,255,255,0.06);
    }

    #door {
      position: absolute;
      width: 120px;
      height: 220px;
      right: 48px;
      top: 132px;
      border: 4px solid #2a2b33;
      background: linear-gradient(180deg, #31353f 0%, #171920 100%);
      border-radius: 4px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), inset 0 0 20px rgba(0,0,0,0.45), 0 0 20px rgba(0,0,0,0.28);
      z-index: 3;
    }

    #door::before {
      content: '';
      position: absolute;
      inset: 12px;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.24);
    }

    #door::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 14px;
      background: #b8babf;
      right: 16px;
      top: 110px;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.18);
    }

    #day2-screen {
      position: absolute;
      inset: 0;
      background: rgba(8, 10, 14, 0.92);
      display: grid;
      place-items: center;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #day2-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .day2-panel {
      width: 640px;
      padding: 24px;
      border: 2px solid rgba(78, 123, 187, 0.8);
      background: #11181f;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      color: #f2f2ec;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
    }

    .day2-panel h1 {
      margin: 0;
      color: #e8e0c4;
      letter-spacing: 0.24em;
      font-size: 40px;
      text-shadow: 0 0 6px rgba(255,255,255,0.08);
    }

    .day2-panel p {
      margin: 12px 0 16px;
      color: #bfb295;
      font-size: 18px;
    }

    .day2-preview {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .day2-window {
      background: #152131;
      border: 2px solid rgba(255,255,255,0.08);
      height: 190px;
      position: relative;
      overflow: hidden;
    }

    .day2-window::before {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      bottom: 10px;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 22%),
                  linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
      pointer-events: none;
    }

    .day2-dialogue {
      background: #0c1016;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 14px;
      min-height: 190px;
      text-align: left;
      font-size: 16px;
      line-height: 1.55;
      color: #e3e3d8;
      white-space: pre-wrap;
    }

    .day2-dialogue .speaker {
      display: block;
      margin-bottom: 10px;
      color: #b9d8b2;
      font-weight: bold;
    }

    .day2-note {
      margin-top: 14px;
      color: #95a1ae;
      font-size: 13px;
    }

    .day2-panel h1 {
      margin: 0;
      color: #f8f2df;
      letter-spacing: 0.22em;
      font-size: 42px;
    }

    .day2-panel p {
      margin: 12px 0 20px;
      color: #c9bca4;
      font-size: 18px;
    }

    .day2-preview {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .day2-window {
      background: #1e2936;
      border: 2px solid #3b4c5e;
      height: 200px;
      position: relative;
      overflow: hidden;
    }

    .day2-window::before {
      content: '';
      position: absolute;
      left: 12px;
      right: 12px;
      top: 12px;
      bottom: 12px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 25%),
                  linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      pointer-events: none;
    }

    .day2-dialogue {
      background: #101820;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      min-height: 200px;
      text-align: left;
      font-size: 16px;
      line-height: 1.5;
      color: #e7e7dd;
      white-space: pre-wrap;
    }

    .day2-dialogue .speaker {
      display: block;
      margin-bottom: 10px;
      color: #b8dab3;
      font-weight: bold;
    }

    .day2-note {
      margin-top: 14px;
      color: #9aa5b1;
      font-size: 13px;
    }

    #ui-overlay {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 56px);
      max-width: 760px;
      background: var(--panel-color);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      display: none;
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    }

    #dialogue-speaker {
      font-size: 14px;
      color: #d7c7af;
      margin-bottom: 8px;
    }

    #dialogue-text {
      font-size: 18px;
      line-height: 1.5;
      min-height: 52px;
    }

    #day-card {
      position: absolute;
      inset: 0;
      background: rgba(8, 8, 8, 1);
      display: grid;
      place-items: center;
      text-align: center;
      opacity: 1;
      transition: opacity 0.6s ease;
      z-index: 5;
    }

    #day-card.hidden { opacity: 0; pointer-events: none; }

    #day-card h1 {
      font-size: 36px;
      color: #f8f2df;
      margin: 0;
      letter-spacing: 0.18em;
    }

    #day-card p {
      margin-top: 16px;
      color: #a89c88;
      font-size: 18px;
    }

    #hint {
      position: absolute;
      right: 20px;
      bottom: 20px;
      color: #8c8c8c;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="classroom" class="scene-layer">
      <img class="scene-image" src="./backgrounds/CLASSROOM.jpeg" alt="Classroom" />
      <div class="wall-panel"></div>
      <div class="chalkboard"></div>
      <div class="window-pane window-left"></div>
      <div class="window-pane window-right"></div>
      <div class="desk-backdrop"></div>
      <div class="desk desk-left"></div>
      <div class="desk desk-right"></div>
      <div class="floor-strip"></div>
    </div>
    <div id="hallway" class="scene-layer">
      <img class="scene-image" src="./backgrounds/HALLWAY.jpeg" alt="Hallway" />
      <div class="hallway-wall"></div>
      <div id="stall-door"></div>
      <div id="toilet"></div>

        </div>
      </div>
    </div>

    <div id="ui-overlay">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
    </div>

    <div id="hint" class="hidden">Press ENTER to advance dialogue. Use arrow keys to move after the cutscene.</div>
  </div>
  <script>
    let playerCanMove = false;
    let dialogueIndex = 0;
    let currentScene = 'classroom';
    let doorReached = false;

    const dialogueLines = [
      { speaker: 'Aoi', text: 'Nene, did you hear? They say Hanako-san of the Toilet grants wishes in the 3rd-floor girls\' bathroom.' },
      { speaker: 'Nene', text: 'The rumor is so creepy... but also... if it is true, I should try it.' },
      { speaker: 'Aoi', text: 'Be careful. The school spirits are not like ordinary ghosts.' },
      { speaker: 'Nene', text: 'I won\'t back down. I\'m going to head there after class.' }
    ];

    const dayCard = document.getElementById('day-card');
    const classroom = document.getElementById('classroom');
    const hallway = document.getElementById('hallway');
    const day2Screen = document.getElementById('day2-screen');
    const uiOverlay = document.getElementById('ui-overlay');
    const speakerEl = document.getElementById('dialogue-speaker');
    const textEl = document.getElementById('dialogue-text');
    const hint = document.getElementById('hint');
    const neneSprite = document.getElementById('nene-sprite');
    const doorEl = document.getElementById('door');

    const playerSpeed = 160;
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    const neneStates = {
      stand: './nene/nene-stand.jpeg',
      walk1: './nene/nene-walk1.jpeg',
      walk2: './nene/nene-walk2.jpeg',
      awww: './nene/nene_awww.jpeg',
      shocked: './nene/nene_shocked.jpeg'
    };

    let neneState = '';
    let walkFrame = 0;
    let walkTimer = 0;

    function fadeOutDayCard() {
      dayCard.classList.add('hidden');
    }

    function fadeInScene() {
      classroom.classList.add('visible');
    }

    function setNeneState(state) {
      if (neneState === state) return;
      neneState = state;
      neneSprite.src = neneStates[state];
      neneSprite.alt = 'Nene';
    }

    function startDialogue() {
      uiOverlay.style.display = 'block';
      hint.classList.remove('hidden');
      showNextDialogueLine();
    }

    function showNextDialogueLine() {
      if (dialogueIndex >= dialogueLines.length) {
        endDialogue();
        return;
      }

      const line = dialogueLines[dialogueIndex];
      speakerEl.textContent = line.speaker;
      textEl.textContent = line.text;
      dialogueIndex += 1;
    }

    function endDialogue() {
      uiOverlay.style.display = 'none';
      hint.textContent = 'Use arrow keys to move Nene toward the hallway door.';
      playerCanMove = true;
    }

    function showDoorReached() {
      doorReached = true;
      playerCanMove = false;
      uiOverlay.style.display = 'block';
      speakerEl.textContent = 'Narrator';
      textEl.textContent = 'You touched the door. A quiet hallway lies beyond.';
      hint.textContent = 'Press ENTER to continue.';
    }

    function transitionToHallway() {
      uiOverlay.style.display = 'none';
      hint.textContent = '';
      dayCard.querySelector('h1').textContent = 'SCENE 2: TOILET SUMMONING';
      dayCard.querySelector('p').textContent = 'Nene leaves the classroom and enters a darker hallway leading to the girls\' bathroom.';
      dayCard.classList.remove('hidden');
      classroom.classList.remove('visible');
      hallway.classList.add('visible');
      currentScene = 'hallway';
      playerCanMove = false;
      doorReached = false;
      setTimeout(() => {
        dayCard.classList.add('hidden');
        showDay2Screen();
      }, 2200);
    }

    function showDay2Screen() {
      day2Screen.classList.add('visible');
      currentScene = 'day2';
      playerCanMove = false;
      doorEl.style.display = 'none';
      setNeneState('awww');
      hint.textContent = 'Press ENTER to continue.';
    }

    function hideDay2Screen() {
      day2Screen.classList.remove('visible');
      currentScene = 'hallway';
      doorEl.style.display = 'none';
      dayCard.classList.add('hidden');
      neneSprite.style.left = '140px';
      neneSprite.style.top = '330px';
      playerCanMove = true;
      setNeneState('stand');
      hint.textContent = 'Use arrow keys to explore the hallway.';
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateNeneState(delta) {
      if (doorReached || currentScene !== 'classroom') return;

      const moving = keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight;
      if (!playerCanMove || !moving) {
        setNeneState('stand');
        walkTimer = 0;
        return;
      }

      walkTimer += delta;
      if (walkTimer >= 0.2) {
        walkTimer -= 0.2;
        walkFrame = (walkFrame + 1) % 2;
        setNeneState(walkFrame === 0 ? 'walk1' : 'walk2');
      }
    }

    function updatePlayerPosition(delta) {
      if (!playerCanMove) return;

      let dx = 0;
      let dy = 0;
      if (keys.ArrowRight) dx += 1;
      if (keys.ArrowLeft) dx -= 1;
      if (keys.ArrowDown) dy += 1;
      if (keys.ArrowUp) dy -= 1;

      if (dx === 0 && dy === 0) return;

      const length = Math.sqrt(dx * dx + dy * dy);
      dx /= length;
      dy /= length;

      const left = parseFloat(neneSprite.style.left || 0);
      const top = parseFloat(neneSprite.style.top || 0);
      const nextLeft = clamp(left + dx * playerSpeed * delta, 0, 840 - neneSprite.offsetWidth);
      const nextTop = clamp(top + dy * playerSpeed * delta, 0, 480 - neneSprite.offsetHeight);

      neneSprite.style.left = `${nextLeft}px`;
      neneSprite.style.top = `${nextTop}px`;
    }

    function checkDoorCollision() {
      if (doorReached || !playerCanMove || currentScene !== 'classroom') return;

      const playerRect = neneSprite.getBoundingClientRect();
      const doorRect = doorEl.getBoundingClientRect();
      const overlap = !(playerRect.right < doorRect.left || playerRect.left > doorRect.right || playerRect.bottom < doorRect.top || playerRect.top > doorRect.bottom);

      if (overlap) {
        showDoorReached();
      }
    }

    function gameLoop(timestamp) {
      if (!gameLoop.lastTime) gameLoop.lastTime = timestamp;
      const delta = (timestamp - gameLoop.lastTime) / 1000;
      gameLoop.lastTime = timestamp;
      updateNeneState(delta);
      updatePlayerPosition(delta);
      checkDoorCollision();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        if (currentScene === 'day2' && day2Screen.classList.contains('visible')) {
          hideDay2Screen();
          event.preventDefault();
          return;
        }

        if (uiOverlay.style.display === 'block') {
          if (doorReached) {
            transitionToHallway();
          } else {
            showNextDialogueLine();
          }
          event.preventDefault();
          return;
        }
      }

      if (event.key in keys) {
        keys[event.key] = true;
        event.preventDefault();
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.key in keys) {
        keys[event.key] = false;
      }
    });

    window.addEventListener('load', () => {
      neneSprite.style.left = '210px';
      neneSprite.style.top = '230px';
      setNeneState('stand');

      setTimeout(() => {
        fadeOutDayCard();
        fadeInScene();
      }, 3000);

      setTimeout(() => {
        startDialogue();
      }, 3800);

      requestAnimationFrame(gameLoop);
    });
  </script>
  </body>
</html>
